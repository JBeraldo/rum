services:
    app:
        build:
            context: .
            target: app
        image: rum:latest
        env_file: .env.production
        depends_on:
            database:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        restart: unless-stopped

    migrate:
        image: rum:latest
        env_file: .env.production
        command: ['php', 'artisan', 'migrate', '--force', '--no-interaction']
        depends_on:
            database:
                condition: service_healthy
        restart: 'no'

    web:
        build:
            context: .
            target: web
        image: rum-web:latest
        ports:
            - '${APP_PORT:-80}:80'
        depends_on:
            - app
        restart: unless-stopped
        healthcheck:
            test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/up']
            interval: 30s
            timeout: 5s
            retries: 3
            start_period: 15s

    queue:
        image: rum:latest
        env_file: .env.production
        command: ['php', 'artisan', 'queue:work', 'redis', '--sleep=3', '--tries=3', '--max-time=3600', '--no-interaction']
        depends_on:
            database:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        restart: unless-stopped

    scheduler:
        image: rum:latest
        env_file: .env.production
        command: ['php', 'artisan', 'schedule:work', '--no-interaction']
        depends_on:
            database:
                condition: service_healthy
            migrate:
                condition: service_completed_successfully
        restart: unless-stopped

    valkey:
        image: valkey/valkey:8-alpine
        command: ['valkey-server', '--appendonly', 'yes']
        volumes:
            - rum-valkey:/data
        healthcheck:
            test: ['CMD', 'valkey-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

    database:
        image: postgres:18-alpine
        environment:
            POSTGRES_DB: '${DB_DATABASE}'
            POSTGRES_USER: '${DB_USERNAME}'
            POSTGRES_PASSWORD: '${DB_PASSWORD}'
        volumes:
            - rum-database:/var/lib/postgresql
        healthcheck:
            test: ['CMD-SHELL', 'pg_isready -U "$$POSTGRES_USER" -d "$$POSTGRES_DB"']
            interval: 10s
            timeout: 5s
            retries: 5
        restart: unless-stopped

volumes:
    rum-database:
    rum-valkey:
